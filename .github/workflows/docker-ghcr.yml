name: Build and push Docker image (GHCR)

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
            NEXT_PUBLIC_CHAIN_ID=421614
            NEXT_PUBLIC_RPC_URL=https://sepolia-rollup.arbitrum.io/rpc
            NEXT_PUBLIC_DEMO_ASSET_ADDRESS=${{ secrets.NEXT_PUBLIC_DEMO_ASSET_ADDRESS }}
            NEXT_PUBLIC_DEMO_CONFIDENTIAL_WRAPPER_ADDRESS=${{ secrets.NEXT_PUBLIC_DEMO_CONFIDENTIAL_WRAPPER_ADDRESS }}
            NEXT_PUBLIC_DEMO_FAUCET_ADDRESS=${{ secrets.NEXT_PUBLIC_DEMO_FAUCET_ADDRESS }}
            NEXT_PUBLIC_VAULT_CONTRACT_ADDRESS=${{ secrets.NEXT_PUBLIC_VAULT_CONTRACT_ADDRESS }}
            NEXT_PUBLIC_RWA_GOLD_ASSET=${{ secrets.NEXT_PUBLIC_RWA_GOLD_ASSET }}
            NEXT_PUBLIC_RWA_GOLD_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_GOLD_WRAPPER }}
            NEXT_PUBLIC_RWA_PLATINUM_ASSET=${{ secrets.NEXT_PUBLIC_RWA_PLATINUM_ASSET }}
            NEXT_PUBLIC_RWA_PLATINUM_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_PLATINUM_WRAPPER }}
            NEXT_PUBLIC_RWA_OIL_ASSET=${{ secrets.NEXT_PUBLIC_RWA_OIL_ASSET }}
            NEXT_PUBLIC_RWA_OIL_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_OIL_WRAPPER }}
            NEXT_PUBLIC_RWA_DIAMOND_ASSET=${{ secrets.NEXT_PUBLIC_RWA_DIAMOND_ASSET }}
            NEXT_PUBLIC_RWA_DIAMOND_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_DIAMOND_WRAPPER }}
            NEXT_PUBLIC_RWA_SILVER_ASSET=${{ secrets.NEXT_PUBLIC_RWA_SILVER_ASSET }}
            NEXT_PUBLIC_RWA_SILVER_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_SILVER_WRAPPER }}
            NEXT_PUBLIC_RWA_RARE_EARTH_ASSET=${{ secrets.NEXT_PUBLIC_RWA_RARE_EARTH_ASSET }}
            NEXT_PUBLIC_RWA_RARE_EARTH_WRAPPER=${{ secrets.NEXT_PUBLIC_RWA_RARE_EARTH_WRAPPER }}

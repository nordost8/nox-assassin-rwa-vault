# Pi production runner — image must be pre-built separately.
# Usage on Pi:
#   1. cp .env.prod.example .env.prod && nano .env.prod   (fill in secrets)
#   2. docker compose up -d
services:
  app:
    image: nox-rwa-shield:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    volumes:
      - ./logs:/app/logs   # bind-mount for NOX_LOG_FILE if enabled in .env.prod
    restart: unless-stopped
